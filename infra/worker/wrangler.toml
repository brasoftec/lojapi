name = "lojapi-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Domínio customizado — configure após adicionar ofertatop.com.br ao Cloudflare
# Passo 1: Adicione o domínio em https://dash.cloudflare.com → Add a Site
# Passo 2: Aponte os nameservers do domínio para o Cloudflare
# Passo 3: Descomente as linhas abaixo e rode: npx wrangler deploy
#
# [[routes]]
# pattern = "api.ofertatop.com.br/*"
# zone_name = "ofertatop.com.br"

# Variáveis de ambiente (valores sensíveis ficam em secrets)
[vars]
ENVIRONMENT = "production"

# Secrets configurados via: npx wrangler secret put AZURE_BACKEND_URL
# AZURE_BACKEND_URL = "https://lojapi.azurecontainerapps.io"

[observability]
enabled = true

# Limites do plano gratuito Cloudflare Workers:
# - 100.000 req/dia
# - 10ms CPU por request
# Quando atingir → fallback automático para Azure (via status 429/1015)
