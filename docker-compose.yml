version: '3.9'

services:
  # ─── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lojapi
    restart: unless-stopped
    ports:
      - '${PORT:-3001}:3001'
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://lojapi:lojapi@postgres:5432/lojapi}
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgresql}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-production}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lojapi-network

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lojapi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lojapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lojapi}
      POSTGRES_DB: ${POSTGRES_DB:-lojapi}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-lojapi} -d ${POSTGRES_DB:-lojapi}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lojapi-network

  # ─── Adminer (gerenciador visual do banco) ─────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: lojapi-adminer
    restart: unless-stopped
    ports:
      - '${ADMINER_PORT:-8080}:8080'
    depends_on:
      - postgres
    networks:
      - lojapi-network

volumes:
  postgres-data:
  uploads:

networks:
  lojapi-network:
    driver: bridge
