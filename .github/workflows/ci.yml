name: CI/CD — lojapi

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: lojapiregistry
  ACR_SERVER: lojapiregistry.azurecr.io
  APP_NAME: lojapi
  RG: lojapi-rg

jobs:
  # ── 1. Build & Type Check ───────────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── 2. Deploy Azure (apenas na main) ───────────────────────────────────────
  deploy:
    name: Deploy → Azure Container Apps
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & Push imagem
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image lojapi:${{ github.sha }} \
            --image lojapi:latest \
            --file Dockerfile .

      - name: Deploy Container App
        run: |
          az containerapp update \
            --resource-group ${{ env.RG }} \
            --name ${{ env.APP_NAME }} \
            --image ${{ env.ACR_SERVER }}/lojapi:${{ github.sha }} \
            --set-env-vars "BUILD_TIME=${{ github.run_number }}"

      - name: Health check
        run: |
          sleep 30
          curl -f "https://api.ofertatop.com.br/status" || echo "Ainda inicializando"
