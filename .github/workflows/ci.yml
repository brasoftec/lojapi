name: CI/CD — lojapi

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: lojapiregistry
  ACR_SERVER: lojapiregistry.azurecr.io
  APP_NAME: lojapi
  RG: lojapi-rg

jobs:
  # ── 1. Build & Type Check ───────────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./dev.db"
          DATABASE_PROVIDER: "sqlite"

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── 2. Deploy Azure (apenas na main) ───────────────────────────────────────
  deploy-azure:
    name: Deploy → Azure Container Apps
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      app_url: ${{ steps.get_url.outputs.app_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push imagem
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image lojapi:${{ github.sha }} \
            --image lojapi:latest \
            --file Dockerfile .

      - name: Deploy Container App
        run: |
          az containerapp update \
            --resource-group ${{ env.RG }} \
            --name ${{ env.APP_NAME }} \
            --image ${{ env.ACR_SERVER }}/lojapi:${{ github.sha }}

      - name: Obter URL
        id: get_url
        run: |
          URL=$(az containerapp show \
            --resource-group ${{ env.RG }} \
            --name ${{ env.APP_NAME }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "app_url=https://$URL" >> $GITHUB_OUTPUT
          echo "✅ App URL: https://$URL"

      - name: Health check
        run: |
          sleep 20
          curl -f "${{ steps.get_url.outputs.app_url }}/status" || echo "⚠️ Ainda inicializando"

  # ── 3. Deploy Cloudflare Worker (após Azure) ────────────────────────────────
  deploy-worker:
    name: Deploy → Cloudflare Worker
    runs-on: ubuntu-latest
    needs: deploy-azure
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Worker deps
        run: npm install
        working-directory: infra/worker

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: infra/worker
          secrets: |
            AZURE_BACKEND_URL
        env:
          AZURE_BACKEND_URL: ${{ needs.deploy-azure.outputs.app_url }}
